[agent]
name = "claude-wsl-ubuntu"
version = "1.0.0"
description = "Anthropic Claude Code CLI"
driver = "subprocess"

[capabilities]
chat = true
streaming = false
tools = false
vision = false
code_execution = true

[subprocess]
command = "/home/zhiqing/.local/bin/claude"
args = []
shell = "wsl"
wsl_distro = "Ubuntu"
input_mode = "argv"
output_mode = "raw"

[subprocess.env]

[channels]
auto_join = ["general"]

[agent]
name = "hermes-ssh-1"
version = "1.0.0"
description = "Hermes agent"
driver = "subprocess"

[capabilities]
chat = true
streaming = false
tools = false
vision = false
code_execution = true

[subprocess]
command = "/home/zhiqing/.local/bin/hermes"
args = ["chat", "-Q", "-q"]
shell = "ssh"
ssh_host = "192.168.50.1"
ssh_user = "zhiqing"
input_mode = "argv"
output_mode = "raw"

[subprocess.env]

[channels]
auto_join = ["general"]

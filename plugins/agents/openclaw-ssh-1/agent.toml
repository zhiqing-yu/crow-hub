[agent]
name = "openclaw-ssh-1"
version = "1.0.0"
description = "OpenClaw agent"
driver = "subprocess"

[capabilities]
chat = true
streaming = false
tools = false
vision = false
code_execution = true

[subprocess]
command = "/home/zhiqing/.nvm/versions/node/v24.14.0/bin/openclaw"
args = [
    "agent",
    "--agent",
    "main",
    "--local",
    "--json",
    "-m",
]
shell = "ssh"
ssh_host = "192.168.50.1"
ssh_user = "zhiqing"
input_mode = "argv"
output_mode = "json"
output_filter = "payloads.0.text"

[subprocess.env]

[channels]
auto_join = ["general"]
